name: Deploy
on:
  push:
    branches: [master]
  workflow_dispatch: {}

jobs:
  deploy:
    permissions:
      contents: read
      packages: write
    uses: Grublaff/deploy-workflows/.github/workflows/deploy-site.yml@v1.2
    with:
      image-name: recipe-app
      site-type: static
      build-command: npm run build
      build-output: dist/recipe-app/browser
    secrets: inherit
