<div class="page">
  <div class="page__head fade-in">
    <div class="h-left">
      <span class="eyebrow">Mitt kök · {{ allRecipes.length }} recept</span>
      <h1 class="page__title">Recept</h1>
    </div>
    <span class="page__count">{{ recipes.length }} / {{ allRecipes.length }}</span>
  </div>

  <div class="controls fade-in" style="animation-delay: 60ms">
    <div class="search">
      <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/>
        <path d="m20 20-3.5-3.5"/>
      </svg>
      <input
        type="text"
        [(ngModel)]="searchQuery"
        (ngModelChange)="onSearch()"
        placeholder="Sök recept, ingredienser, tillfällen…"
      />
      <span class="kbd">⌘ K</span>
    </div>

    <div class="chips" *ngIf="categories.length">
      <span class="group-label">Kategori</span>
      <button
        *ngFor="let category of categories"
        type="button"
        class="chip"
        [class.active]="isCategorySelected(category)"
        [style.--cat-color]="categoryColor(category)"
        (click)="toggleCategory(category)"
      >
        <span class="dot"></span>
        {{ category }}
      </button>
      <button *ngIf="selectedCategories.length" type="button" class="chip clear" (click)="clearCategories()">
        Rensa
      </button>
    </div>
  </div>

  <div *ngIf="loading" class="state">Laddar recept…</div>
  <div *ngIf="error" class="state error">{{ error }}</div>

  <ng-container *ngIf="!loading && !error">
    <div *ngIf="recipes.length === 0" class="empty">
      <div class="big">Inga recept matchade.</div>
      <div>Prova en annan sökning eller rensa filtren.</div>
    </div>

    <div *ngIf="recipes.length" class="grid">
      <button
        *ngFor="let recipe of recipes; let i = index; trackBy: trackById"
        type="button"
        class="card fade-in"
        [style.animation-delay.ms]="80 + i * 30"
        (click)="viewRecipe(recipe.id)"
      >
        <span class="card__num">{{ cardNumber(i) }}</span>
        <h2 class="card__title">{{ recipe.name }}</h2>
        <p class="card__desc">{{ recipe.description }}</p>
        <div class="card__meta">
          <div class="card__cats">
            <span class="tag" *ngFor="let c of recipe.categories" [style.--cat-color]="categoryColor(c)">
              <span class="dot"></span>
              {{ c }}
            </span>
          </div>
          <div class="card__bottom">
            <span class="time">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="9"/>
                <path d="M12 7v5l3 2"/>
              </svg>
              {{ formatTime(recipe.cookingTime) }}
            </span>
            <span class="card__cta">
              Visa recept
              <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14"/>
                <path d="m13 6 6 6-6 6"/>
              </svg>
            </span>
          </div>
        </div>
      </button>
    </div>
  </ng-container>
</div>
